# =============================================================================
# Floorcast configuration — the single, standard estate.
# -----------------------------------------------------------------------------
# This is THE config (loaded by default via config/settings.py; override the
# path with FLOORCAST_CONFIG_FILE). It pairs with the demo floor that
# `scripts/seed_data.py` seeds (see generate_demo_floor) to make a deliberately
# "hard" estate where the optimizer's objectives genuinely trade off.
#
# Regression baseline: on the seeded floor, objective=maximize_racks_modernized
# with no overrides => 96 swaps / 612.0 row-overage (see tests).
#
# The catalog exposes THREE diverging targets per family (a cheap "value" rack, a
# power-hungry "max-compute" rack, and a "high-efficiency" rack) so that
# maximize_compute, maximize_value_per_pound and maximize_efficiency each pick a
# DIFFERENT target. Combined with the floor's binding throughput and
# swap-avoidable overage, every objective is forced into real tradeoffs.
# =============================================================================

dynamo:
  table_name: floorcast
  gsi_power: gsi-power
  gsi_generation: gsi-generation

aurora:
  schema: public
  pool_size: 5
  max_overflow: 10

# -----------------------------------------------------------------------------
# Catalog. Current fleet = 2023 + 2024 (both retirable here — see optimizer
# .retire_generation_at_or_below: 2024). Targets = gen-2025, THREE per family.
#
# Per family the three targets are engineered to diverge on three axes so that
# different objectives select different racks:
#   - "-value" : lowest cost, decent compute  -> wins compute-per-£   (value)
#   - "-max"   : highest raw compute, high power & cost -> wins raw compute
#   - "-eff"   : best compute-per-kW (low power) -> wins efficiency, least overage
# (verify the argmaxes with: make seed-dry)
# -----------------------------------------------------------------------------
rack_catalog:
  # ---- current fleet: 2023 (retirable) ----
  compute-2023:
    family: compute
    generation: 2023
    power_draw_kw: 8.5
    rack_units: 42
    is_replacement_target: false
    cost: 32000
    compute_capability: 60
    producer: Helix Compute
  storage-2023:
    family: storage
    generation: 2023
    power_draw_kw: 6.0
    rack_units: 42
    is_replacement_target: false
    cost: 18000
    compute_capability: 20
    producer: Vanta Storage
  ai-2023:
    family: ai
    generation: 2023
    power_draw_kw: 22.0
    rack_units: 42
    is_replacement_target: false
    cost: 95000
    compute_capability: 180
    producer: Cirrus AI

  # ---- current fleet: 2024 (also retirable in the demo) ----
