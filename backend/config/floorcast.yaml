  compute-2025-max:      # wins raw compute (power-hungry, pricey)
    family: compute
    generation: 2025
    power_draw_kw: 20.0
    rack_units: 42
    is_replacement_target: true
    cost: 90000
    compute_capability: 200
    producer: Helix Compute
  compute-2025-eff:      # wins compute-per-kW (lowest power)
    family: compute
    generation: 2025
    power_draw_kw: 10.0
    rack_units: 42
    is_replacement_target: true
    cost: 60000
    compute_capability: 130
