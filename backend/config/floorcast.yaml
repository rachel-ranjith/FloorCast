  # ---- storage targets (gen 2025) ----
  storage-2025-value:
    family: storage
    generation: 2025
    power_draw_kw: 7.0
    rack_units: 42
    is_replacement_target: true
    cost: 20000
    compute_capability: 35
    producer: Vanta Storage
  storage-2025-max:
    family: storage
    generation: 2025
    power_draw_kw: 11.0
    rack_units: 42
    is_replacement_target: true
    cost: 38000
    compute_capability: 60
