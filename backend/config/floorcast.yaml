    generation: 2024
    power_draw_kw: 11.0
    rack_units: 42
    is_replacement_target: false
    cost: 41000
    compute_capability: 85
    producer: Helix Compute
  storage-2024:
    family: storage
    generation: 2024
    power_draw_kw: 7.5
    rack_units: 42
    is_replacement_target: false
    cost: 22000
    compute_capability: 28
    producer: Vanta Storage
  ai-2024:
    family: ai
    generation: 2024
    power_draw_kw: 35.0
    rack_units: 42
    is_replacement_target: false
    cost: 150000
    compute_capability: 300
    producer: Cirrus AI

  # ---- compute targets (gen 2025) ----
  compute-2025-value:    # wins value-per-£
    family: compute
    generation: 2025
