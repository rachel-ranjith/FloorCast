# -----------------------------------------------------------------------------
# Power envelope — same shape as default (row usable = 90 * 0.8 = 72 kW). The
# demo floor's "near-threshold" rows are built right under 72 so that swapping
# their candidate tips them over (swap-avoidable overage).
# -----------------------------------------------------------------------------
power:
  headroom_pct: 0.20
  building_capacity_mw: 6.0
  suite_capacity_mw: 1.5
  row_capacity_kw: 90.0

# -----------------------------------------------------------------------------
# Optimizer. Throughput (8/mo x 12 = 96 swap slots) is deliberately LESS than
# the number of worth-doing candidates the demo floor seeds (110), so the solver
# must prioritize. 2024s are retirable here too.
# -----------------------------------------------------------------------------
optimizer:
  horizon_months: 12
  max_swaps_per_month: 8
  max_swaps_per_suite_per_month: 3
  swap_cost_per_rack: 1.0
  deferral_penalty_per_month: 0.15
  row_overage_penalty: 1000.0
  solver_time_limit_seconds: 60
  retire_generation_at_or_below: 2024
  objective: maximize_racks_modernized
  time_discount: 1.0
