# =============================================================================
# Floorcast configuration
# -----------------------------------------------------------------------------
# NOTHING in the optimizer, power model, or topology generator is hardcoded.
# Every constraint, limit, and power draw is defined here and loaded at runtime
# via config/settings.py. Environment variables (FLOORCAST_*) override these.
#
# Units:
#   power   -> kilowatts (kW) unless a field name ends in _mw (megawatts)
#   horizon -> months
# =============================================================================

dynamo:
  table_name: floorcast
  # GSIs are declared in src/floorcast/db/dynamo/tables.py; names referenced here
  gsi_power: gsi-power
  gsi_generation: gsi-generation

aurora:
  schema: public
  pool_size: 5
  max_overflow: 10

# -----------------------------------------------------------------------------
# Catalog of rack types. The optimizer treats any rack whose generation is
# below `min_target_generation` as a replacement candidate, and may replace it
# with any rack flagged `is_replacement_target: true`.
# -----------------------------------------------------------------------------
rack_catalog:
  # ---- 2023 generation (replacement candidates) ----
  compute-2023:
    family: compute
    generation: 2023
    power_draw_kw: 8.5
    rack_units: 42
    is_replacement_target: false
  storage-2023:
    family: storage
    generation: 2023
    power_draw_kw: 6.0
    rack_units: 42
    is_replacement_target: false
  ai-2023:
    family: ai
    generation: 2023
    power_draw_kw: 22.0
    rack_units: 42
    is_replacement_target: false

  # ---- 2024 generation (current fleet) ----
  compute-2024:
    family: compute
    generation: 2024
    power_draw_kw: 11.0
    rack_units: 42
    is_replacement_target: false
  storage-2024:
    family: storage
    generation: 2024
    power_draw_kw: 7.5
    rack_units: 42
    is_replacement_target: false
  ai-2024:
    family: ai
    generation: 2024
    power_draw_kw: 35.0
    rack_units: 42
    is_replacement_target: false

  # ---- 2025 generation (what we install during a swap) ----
  compute-2025:
    family: compute
    generation: 2025
    power_draw_kw: 13.5
    rack_units: 42
    is_replacement_target: true
  storage-2025:
    family: storage
    generation: 2025
    power_draw_kw: 8.0
    rack_units: 42
    is_replacement_target: true
  ai-2025:
    family: ai
    generation: 2025
    power_draw_kw: 48.0
    rack_units: 42
    is_replacement_target: true

# -----------------------------------------------------------------------------
# Power envelope. Headroom is enforced at every tier, at every month of the plan.
# A tier is "within headroom" when  load <= capacity * (1 - headroom_pct).
# -----------------------------------------------------------------------------
power:
  headroom_pct: 0.20          # keep 20% of capacity free at all times
  building_capacity_mw: 6.0   # per-building power feed
  suite_capacity_mw: 1.5      # per-suite PDU budget
  row_capacity_kw: 90.0       # per-row busway / branch-circuit limit

# -----------------------------------------------------------------------------
# Optimization engine knobs (OR-Tools ILP).
# -----------------------------------------------------------------------------
optimizer:
  horizon_months: 12
  max_swaps_per_month: 8          # crew/logistics throughput cap
  max_swaps_per_suite_per_month: 3
  swap_cost_per_rack: 1.0         # objective weight: minimize disruption
  deferral_penalty_per_month: 0.15  # objective weight: prefer doing swaps sooner
  # Penalty per kW of row-tier load OVER the row headroom threshold, per month.
  # Row headroom is a SOFT constraint (building/suite stay HARD): a row may run
  # hot, but the solver pays this weight for every kW-month of overage and so
  # drives it to the minimum the swaps allow. Magnitude rationale:
  #   - swap_cost_per_rack = 1.0 and total deferral penalty <= 0.15*12 = 1.8,
  #     so at 1000.0 a single kW-month of overage outweighs the entire cost/
  #     deferral budget of a swap by ~3 orders of magnitude => overage is always
  #     reduced before optimizing swap count/timing.
  #   - it stays BELOW the internal completion reward (~1e6 per swap), so the
  #     solver still performs every feasible swap; for swaps that unavoidably add
  #     overage it defers them to later months (fewer kW-months) rather than
  #     skipping them. Raise above ~1e6 only if you want overage to *prevent*
  #     modernization swaps outright.
  row_overage_penalty: 1000.0
  solver_time_limit_seconds: 60
  # Which generations are eligible to be retired (anything <= this).
  retire_generation_at_or_below: 2023
