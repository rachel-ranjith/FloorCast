# Local dev infrastructure: DynamoDB Local + PostgreSQL (Aurora stand-in).
services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    ports:
      - "8000:8000"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: floorcast
      POSTGRES_PASSWORD: floorcast
      POSTGRES_DB: floorcast
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
